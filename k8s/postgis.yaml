apiVersion: v1
kind: Service
metadata:
  name: postgis
spec:
  clusterIP: None
  selector: { app: postgis }
  ports: [{ port: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgis
spec:
  serviceName: postgis
  replicas: 1
  selector:
    matchLabels: { app: postgis }
  template:
    metadata:
      labels: { app: postgis }
    spec:
      containers:
        - name: postgis
          image: postgis/postgis:16-3.4
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: gis }
            - { name: POSTGRES_PASSWORD, value: gis_dev_password }
            - { name: POSTGRES_DB, value: public_gis }
          volumeMounts:
            - { name: pgdata, mountPath: /var/lib/postgresql/data }
            - { name: db-init, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
      volumes:
        - name: db-init
          configMap:
            name: db-init   # create first: kubectl create configmap db-init --from-file=db/init/
  volumeClaimTemplates:
    - metadata: { name: pgdata }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 10Gi } }
