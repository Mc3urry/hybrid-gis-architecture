name: hybrid-gis

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: hybrid-postgis
    environment:
      POSTGRES_USER: gis
      POSTGRES_PASSWORD: gis_dev_password
      POSTGRES_DB: public_gis
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gis -d public_gis"]
      interval: 5s
      timeout: 3s
      retries: 12

  martin:
    # Vector tile server. Auto-discovers tables/views with geometry columns.
    image: ghcr.io/maplibre/martin:v0.14.2
    container_name: hybrid-martin
    environment:
      DATABASE_URL: postgresql://gis:gis_dev_password@postgis:5432/public_gis
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "3000:3000"

  geoserver:
    # Full OGC service surface (WMS/WFS/OGC API - Features) where Martin is not enough.
    image: docker.osgeo.org/geoserver:2.25.2
    container_name: hybrid-geoserver
    environment:
      SKIP_DEMO_DATA: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgis:
        condition: service_healthy

  keycloak:
    # Identity for any authenticated public-side functions. Tiles stay anonymous-read.
    image: quay.io/keycloak/keycloak:24.0
    container_name: hybrid-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_dev_password
    ports:
      - "8081:8080"

  web:
    # Public outage map, static hosting only.
    image: nginx:alpine
    container_name: hybrid-web
    volumes:
      - ./web:/usr/share/nginx/html:ro
    ports:
      - "8088:80"
    depends_on:
      - martin

volumes:
  pgdata:
